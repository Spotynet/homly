# Nginx — Homly con HTTP (redirect) + HTTPS (SSL)
# Certbot debe haber creado ya los certs. Si no: sudo certbot --nginx -d homly.com.mx -d www.homly.com.mx
# Copiar al EC2 y reemplazar /etc/nginx/sites-available/homly, luego:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cambios de seguridad aplicados:
#   B-03 — rate limiting en endpoints de autenticación (limit_req_zone)
#   M-04 — /media/ protegido: Django valida autenticación, Nginx sirve el archivo
#           via location /protected-media/ (internal)

# B-03: Rate limiting — 10 req/min por IP en endpoints de auth
# Definir en el contexto http (fuera del bloque server).
# En /etc/nginx/nginx.conf agregar dentro del bloque http:
#   limit_req_zone $binary_remote_addr zone=homly_auth:10m rate=10r/m;
# O incluir este archivo desde nginx.conf y mover el limit_req_zone allí.
# (Aquí se declara solo si este archivo se include desde el contexto http)

# Redirect HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _ homly.com.mx www.homly.com.mx;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _ homly.com.mx www.homly.com.mx;

    # Certbot escribe estas rutas al correr certbot --nginx
    ssl_certificate /etc/letsencrypt/live/homly.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/homly.com.mx/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/ubuntu/homly/frontend/build;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # B-03: Rate limiting en endpoints de autenticación
    # Requiere que limit_req_zone esté definido en el contexto http de nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=homly_auth:10m rate=10r/m;
    location /api/auth/ {
        limit_req zone=homly_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # M-04: Archivos de media — acceso SOLO via Django (autenticado).
    # El endpoint /api/media/<path> en Django valida autenticación y
    # devuelve X-Accel-Redirect apuntando a este location internal.
    # Los archivos NUNCA son accesibles directamente desde /media/.
    location /protected-media/ {
        internal;  # Solo accesible por X-Accel-Redirect — no desde el navegador directamente
        alias /home/ubuntu/homly/backend/media/;
        # Headers de seguridad adicionales para archivos descargados
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "private, no-store" always;
    }

    # Bloquear acceso directo a /media/ (sin autenticación)
    location /media/ {
        deny all;
        return 403;
    }
}
