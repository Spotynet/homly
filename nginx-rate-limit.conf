# ─────────────────────────────────────────────────────────────────────────────
#  Homly — Nginx rate limiting (B-03)
#  Este fragmento va en el bloque http {} de /etc/nginx/nginx.conf
#  (NO dentro de un bloque server).
#
#  Instrucciones de instalación en EC2:
#    1. Abrir /etc/nginx/nginx.conf
#    2. Dentro del bloque http { ... } agregar:
#         include /etc/nginx/snippets/homly-rate-limit.conf;
#    3. Copiar este archivo:
#         sudo cp nginx-rate-limit.conf /etc/nginx/snippets/homly-rate-limit.conf
#    4. Probar y recargar:
#         sudo nginx -t && sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

# Zona de rate limiting para autenticación:
# - Clave: IP binaria del cliente (4 bytes IPv4 / 16 bytes IPv6)
# - Zona: 10MB de memoria (suficiente para ~160 000 IPs únicas)
# - Tasa: máximo 10 solicitudes por minuto por IP
limit_req_zone $binary_remote_addr zone=homly_auth:10m rate=10r/m;

# Zona general para la API (más permisiva):
limit_req_zone $binary_remote_addr zone=homly_api:10m rate=60r/m;

# Comportamiento ante exceso de límite:
limit_req_status 429;

# Incluir cabecera Retry-After en respuestas 429
# (Nginx no la agrega automáticamente; se maneja desde Django middleware)
